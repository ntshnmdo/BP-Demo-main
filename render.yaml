services:
  # ── NestJS Backend ──────────────────────────────────────────────
  - type: web
    name: battery-passport-backend
    runtime: docker
    dockerfilePath: ./apps/backend/Dockerfile
    dockerContext: ./apps/backend
    plan: free
    healthCheckPath: /api/passports/public/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_PORT
        value: 3001
      - key: BLOCKCHAIN_PROVIDER
        value: mock
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: battery-passport-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false   # fill manually with your Vercel URL after deploying frontend

# ── PostgreSQL Database ──────────────────────────────────────────
databases:
  - name: battery-passport-db
    plan: free
    databaseName: battery_passport
    user: passport_user
