version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: battery_passport_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: battery_passport
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: battery_passport_backend
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/battery_passport
      JWT_SECRET: battery-passport-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 7d
      BACKEND_PORT: 3001
      FRONTEND_URL: http://localhost:3000
      BLOCKCHAIN_PROVIDER: mock
      NODE_ENV: production
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: battery_passport_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api

volumes:
  pgdata:
    driver: local
